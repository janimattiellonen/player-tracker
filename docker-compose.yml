services:
  postgres:
    image: postgres:16-alpine
    container_name: player-tracker-db
    environment:
      POSTGRES_USER: player_tracker
      POSTGRES_PASSWORD: player_tracker
      POSTGRES_DB: player_tracker
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U player_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
